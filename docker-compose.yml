services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-video}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-video}
      - POSTGRES_DB=${POSTGRES_DBNAME:-accounts}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video} -d ${POSTGRES_DBNAME:-accounts}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped


  app:
    build:
      context: .
    image: ${BACKEND_IMAGE:-sellers-accounts-backend}
    environment:
      - APP_ENV=${APP_ENV:-production}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-video}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-video}
      - POSTGRES_DBNAME=${POSTGRES_DBNAME:-accounts}
      - POSTGRES_SSLMODE=disable
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:-dev-insecure-secret-change-me}
      - SHOP_MEDIA_PATH=${SHOP_MEDIA_PATH:-/data}
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.${APP_ENV:-production}.yaml:/app/config/config.${APP_ENV:-production}.yaml:ro
    restart: unless-stopped

volumes:
  postgres_data:
