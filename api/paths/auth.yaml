paths:
  /api/v1/auth/register:
    post:
      summary: POST operation
      tags: [Auth]
      operationId: registerAuth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../schemas/components.yaml#/components/schemas/AuthRegisterRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '../schemas/components.yaml#/components/schemas/AuthResponse' }
        '400': { $ref: '../schemas/components.yaml#/components/responses/AuthError' }
        '409': { $ref: '../schemas/components.yaml#/components/responses/AuthError' }
        '500': { $ref: '../schemas/components.yaml#/components/responses/AuthError' }

  /api/v1/auth/login:
    post:
      summary: POST operation
      tags: [Auth]
      operationId: loginAuth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../schemas/components.yaml#/components/schemas/AuthLoginRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '../schemas/components.yaml#/components/schemas/AuthResponse' }
        '400': { $ref: '../schemas/components.yaml#/components/responses/AuthError' }
        '401': { $ref: '../schemas/components.yaml#/components/responses/AuthError' }
        '500': { $ref: '../schemas/components.yaml#/components/responses/AuthError' }

