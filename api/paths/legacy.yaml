      operationId: listTransactionsLegacy
      parameters:
        - $ref: '../schemas/components.yaml#/components/parameters/Limit'
        - $ref: '../schemas/components.yaml#/components/parameters/Offset'
        - in: query
          name: month
          schema: { type: string, pattern: '^\\d{4}-\\d{2}$' }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
