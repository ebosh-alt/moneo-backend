paths:
  /accounts:
    post:
      summary: POST operation
      tags: [Accounts]
      operationId: createAccountLegacy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/components.yaml#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '../schemas/components.yaml#/components/schemas/Account'
        '400': { $ref: '../schemas/components.yaml#/components/responses/ValidationError' }
        '401': { $ref: '../schemas/components.yaml#/components/responses/UnauthorizedError' }
        '409': { $ref: '../schemas/components.yaml#/components/responses/ConflictError' }
        '422': { $ref: '../schemas/components.yaml#/components/responses/BusinessRuleError' }
        '500': { $ref: '../schemas/components.yaml#/components/responses/InternalError' }
    get:
      summary: GET operation
      tags: [Accounts]
      operationId: listAccountsLegacy
      parameters:
        - $ref: '../schemas/components.yaml#/components/parameters/Limit'
        - $ref: '../schemas/components.yaml#/components/parameters/Offset'
        - $ref: '../schemas/components.yaml#/components/parameters/IncludeArchived'
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: currency
          schema: { type: string }
        - in: query
          name: sort
          schema:
            type: string
            enum: ["createdAt:desc", "name:asc", "balance:desc"]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '../schemas/components.yaml#/components/schemas/PaginatedAccounts' }
        '400': { $ref: '../schemas/components.yaml#/components/responses/ValidationError' }
        '401': { $ref: '../schemas/components.yaml#/components/responses/UnauthorizedError' }
        '500': { $ref: '../schemas/components.yaml#/components/responses/InternalError' }

  /accounts/summary:
