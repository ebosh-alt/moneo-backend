          name: accountId
          schema: { type: string }
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: subcategoryId
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: budgetMemberId
          schema: { type: string }
          description: Currently unsupported in MVP1 (returns 400 validation_error when provided)
        - in: query
          name: sort
          schema:
            type: string
            enum: ["occurredAt:desc", "occurredAt:asc", "createdAt:desc", "createdAt:asc", "amount:desc", "amount:asc"]
