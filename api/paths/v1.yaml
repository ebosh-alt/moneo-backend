      operationId: listTransactions
      parameters:
        - $ref: '../schemas/components.yaml#/components/parameters/Limit'
        - $ref: '../schemas/components.yaml#/components/parameters/Offset'
        - in: query
          name: month
          schema: { type: string, pattern: '^[0-9]{4}-[0-9]{2}$' }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: accountId
          schema: { type: string }
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: subcategoryId
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: budgetMemberId
          schema: { type: string }
          description: Currently unsupported in MVP1 (returns 400 validation_error when provided)
        - in: query
          name: sort
          schema:
            type: string
            enum: ["occurredAt:desc", "occurredAt:asc", "createdAt:desc", "createdAt:asc", "amount:desc", "amount:asc"]
