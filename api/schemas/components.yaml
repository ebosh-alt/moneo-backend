components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
      description: Default 50, max clamped to 200.
    Offset:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
    IncludeArchived:
      in: query
      name: includeArchived
      schema: { type: boolean }
    IncludeSubcategories:
      in: query
      name: includeSubcategories
      schema: { type: boolean }
    AccountId:
      in: path
      name: accountId
      required: true
      schema: { type: string }
    CategoryId:
      in: path
      name: categoryId
      required: true
      schema: { type: string }
    SubcategoryId:
      in: path
      name: subcategoryId
      required: true
      schema: { type: string }
    TransactionId:
      in: path
      name: transactionId
      required: true
      schema: { type: string }

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    BusinessRuleError:
      description: Business rule violation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    InternalError:
      description: Internal error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:
    ErrorDetail:
      type: object
      required: [field, message]
      properties:
        field: { type: string }
        message: { type: string }
    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [validation_error, unauthorized, forbidden, not_found, conflict, business_rule_violation, internal_error]
        message: { type: string }
        details:
          type: array
          items: { $ref: '#/components/schemas/ErrorDetail' }
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { $ref: '#/components/schemas/ErrorBody' }

    Pagination:
      type: object
      required: [limit, offset, total]
      properties:
        limit: { type: integer }
        offset: { type: integer }
        total: { type: integer }

    Account:
      type: object
      required: [id, name, type, currency, balance, initialBalance, includeInNetWorth, includeInDailyBudget, isArchived, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        currency: { type: string }
        balance: { type: string }
        initialBalance: { type: string }
        includeInNetWorth: { type: boolean }
        includeInDailyBudget: { type: boolean }
        isArchived: { type: boolean }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateAccountRequest:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        currency: { type: string }
        initialBalance: { type: string }
        includeInNetWorth: { type: boolean }
        includeInDailyBudget: { type: boolean }

    PatchAccountRequest:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        includeInNetWorth: { type: boolean }
        includeInDailyBudget: { type: boolean }
        currency: { type: string }
        initialBalance: { type: string }
        balance: { type: string }

    AccountSummaryAccount:
      type: object
      required: [id, name, type, currency, balance, includeInNetWorth, includeInDailyBudget]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        currency: { type: string }
        balance: { type: string }
        includeInNetWorth: { type: boolean }
        includeInDailyBudget: { type: boolean }

    AccountSummary:
      type: object
      required: [currency, netWorth, cashBalance, availableForDailyBudget, creditLiabilities, accounts]
      properties:
        currency: { type: string }
        netWorth: { type: string }
        cashBalance: { type: string }
        availableForDailyBudget: { type: string }
        creditLiabilities: { type: string }
        accounts:
          type: array
          items: { $ref: '#/components/schemas/AccountSummaryAccount' }

    Category:
      type: object
      required: [id, name, type, sortOrder, isArchived, subcategories, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        color: { type: string, nullable: true }
        sortOrder: { type: integer }
        isArchived: { type: boolean }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        subcategories:
          type: array
          items: { $ref: '#/components/schemas/Subcategory' }

    CreateCategoryRequest:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        color: { type: string, nullable: true }
        sortOrder: { type: integer }

    PatchCategoryRequest:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        color: { type: string, nullable: true }
        sortOrder: { type: integer }

    Subcategory:
      type: object
      required: [id, categoryId, name, sortOrder, isArchived, createdAt, updatedAt]
      properties:
        id: { type: string }
        categoryId: { type: string }
        name: { type: string }
        sortOrder: { type: integer }
        isArchived: { type: boolean }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateSubcategoryRequest:
      type: object
      properties:
        name: { type: string }
        sortOrder: { type: integer }

    PatchSubcategoryRequest:
      type: object
      properties:
        name: { type: string }
        sortOrder: { type: integer }

    Transaction:
      type: object
      required: [id, type, status, amount, currency, createdAt, updatedAt]
      properties:
        id: { type: string }
        type: { type: string }
        status: { type: string }
        amount: { type: string }
        currency: { type: string }
        occurredAt: { type: string, nullable: true }
        plannedAt: { type: string, nullable: true }
        accountFromId: { type: string, nullable: true }
        accountToId: { type: string, nullable: true }
        categoryId: { type: string, nullable: true }
        subcategoryId: { type: string, nullable: true }
        budgetMemberId: { type: string, nullable: true }
        incomeSourceId: { type: string, nullable: true }
        debtId: { type: string, nullable: true }
        goalId: { type: string, nullable: true }
        investmentId: { type: string, nullable: true }
        recurringPaymentId: { type: string, nullable: true }
        comment: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateTransactionRequest:
      type: object
      properties:
        type: { type: string }
        status: { type: string }
        amount: { type: string }
        currency: { type: string }
        occurredAt: { type: string }
        plannedAt: { type: string }
        accountFromId: { type: string }
        accountToId: { type: string }
        categoryId: { type: string }
        subcategoryId: { type: string }
        comment: { type: string }
        budgetMemberId: { type: string, nullable: true }
        incomeSourceId: { type: string, nullable: true }
        debtId: { type: string, nullable: true }
        goalId: { type: string, nullable: true }
        investmentId: { type: string, nullable: true }
        recurringPaymentId: { type: string, nullable: true }

    PatchTransactionRequest:
      type: object
      properties:
        type: { type: string, nullable: true }
        status: { type: string, nullable: true }
        amount: { type: string, nullable: true }
        currency: { type: string, nullable: true }
        occurredAt: { type: string, nullable: true }
        plannedAt: { type: string, nullable: true }
        accountFromId: { type: string, nullable: true }
        accountToId: { type: string, nullable: true }
        categoryId: { type: string, nullable: true }
        subcategoryId: { type: string, nullable: true }
        comment: { type: string, nullable: true }
        budgetMemberId: { type: string, nullable: true }
        incomeSourceId: { type: string, nullable: true }
        debtId: { type: string, nullable: true }
        goalId: { type: string, nullable: true }
        investmentId: { type: string, nullable: true }
        recurringPaymentId: { type: string, nullable: true }

    DuplicateTransactionRequest:
      type: object
      properties:
        status: { type: string, nullable: true }
        occurredAt: { type: string, nullable: true }
        plannedAt: { type: string, nullable: true }
        comment: { type: string, nullable: true }
        budgetMemberId: { type: string, nullable: true }
        incomeSourceId: { type: string, nullable: true }
        debtId: { type: string, nullable: true }
        goalId: { type: string, nullable: true }
        investmentId: { type: string, nullable: true }
        recurringPaymentId: { type: string, nullable: true }

    CreateTransactionsBulkRequest:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CreateTransactionRequest' }

    PatchTransactionsBulkItemRequest:
      allOf:
        - $ref: '#/components/schemas/PatchTransactionRequest'
        - type: object
          properties:
            id: { type: string }

    PatchTransactionsBulkRequest:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PatchTransactionsBulkItemRequest' }

    TransactionItemsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Transaction' }

    PaginatedAccounts:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Account' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    PaginatedCategories:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Category' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    PaginatedSubcategories:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Subcategory' }
        pagination: { $ref: '#/components/schemas/Pagination' }

    PaginatedTransactions:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Transaction' }
        pagination: { $ref: '#/components/schemas/Pagination' }

