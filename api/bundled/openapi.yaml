openapi: 3.0.3
info:
  title: Moneo Backend API (as-is)
  version: 0.1.0
  license:
    name: Proprietary
    url: https://example.com/license
  description: |
    Contract documents current behavior of auth, catalogs and transactions endpoints as implemented.
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Authentication and authorization endpoints.
  - name: Accounts
    description: Accounts catalog endpoints.
  - name: Categories
    description: Categories catalog endpoints.
  - name: Subcategories
    description: Subcategories catalog endpoints.
  - name: Transactions
    description: Transactions endpoints.
paths:
  /api/v1/auth/register:
    post:
      summary: POST operation
      tags:
        - Auth
      operationId: registerAuth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/AuthError'
        '409':
          $ref: '#/components/responses/AuthError'
        '500':
          $ref: '#/components/responses/AuthError'
  /api/v1/auth/login:
    post:
      summary: POST operation
      tags:
        - Auth
      operationId: loginAuth
      security: []
      requestBody:
        required: true
        content:
