components:
  parameters:
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
      description: Default 50, max clamped to 200.
    Offset:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
    IncludeArchived:
      in: query
      name: includeArchived
      schema:
        type: boolean
    AccountId:
      in: path
      name: accountId
      required: true
      schema:
        type: string
    IncludeSubcategories:
      in: query
      name: includeSubcategories
      schema:
        type: boolean
    CategoryId:
      in: path
      name: categoryId
      required: true
      schema:
        type: string
    SubcategoryId:
      in: path
      name: subcategoryId
      required: true
      schema:
        type: string
    TransactionId:
      in: path
      name: transactionId
      required: true
      schema:
        type: string
  schemas:
    Account:
      type: object
      required:
        - id
        - name
        - type
        - currency
        - balance
        - initialBalance
        - includeInNetWorth
        - includeInDailyBudget
        - isArchived
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        currency:
          type: string
        balance:
          type: string
        initialBalance:
          type: string
        includeInNetWorth:
          type: boolean
        includeInDailyBudget:
          type: boolean
        isArchived:
          type: boolean
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Pagination:
      type: object
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
    PaginatedAccounts:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        pagination:
          $ref: '#/components/schemas/Pagination'
    ErrorDetail:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
    ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - validation_error
            - unauthorized
            - forbidden
            - not_found
            - conflict
            - business_rule_violation
            - internal_error
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
    CreateAccountRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        currency:
          type: string
        initialBalance:
          type: string
        includeInNetWorth:
          type: boolean
        includeInDailyBudget:
          type: boolean
    AccountSummaryAccount:
      type: object
      required:
        - id
        - name
        - type
        - currency
        - balance
        - includeInNetWorth
        - includeInDailyBudget
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        currency:
          type: string
        balance:
          type: string
        includeInNetWorth:
          type: boolean
        includeInDailyBudget:
          type: boolean
    AccountSummary:
      type: object
      required:
        - currency
        - netWorth
        - cashBalance
        - availableForDailyBudget
        - creditLiabilities
        - accounts
      properties:
        currency:
          type: string
        netWorth:
          type: string
        cashBalance:
          type: string
        availableForDailyBudget:
          type: string
        creditLiabilities:
          type: string
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountSummaryAccount'
    PatchAccountRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        includeInNetWorth:
          type: boolean
        includeInDailyBudget:
          type: boolean
        currency:
          type: string
        initialBalance:
          type: string
        balance:
          type: string
    Subcategory:
      type: object
      required:
        - id
        - categoryId
        - name
        - sortOrder
        - isArchived
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        categoryId:
          type: string
        name:
          type: string
        sortOrder:
          type: integer
        isArchived:
          type: boolean
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Category:
      type: object
      required:
        - id
        - name
        - type
        - sortOrder
        - isArchived
        - subcategories
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        color:
          type: string
          nullable: true
        sortOrder:
          type: integer
        isArchived:
          type: boolean
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
