components:
  schemas:
    AuthRegisterRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        password_confirm:
          type: string
    AuthResponse:
      type: object
      required:
        - access_token
        - expires_in
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
    AuthErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    AuthLoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
    AuthOKResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
    AuthMeResponse:
      type: object
      required:
        - id
        - email
        - email_verified
        - created_at
      properties:
        id:
          type: string
        email:
          type: string
        email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
    AuthSession:
      type: object
      required:
        - id
        - created_at
        - expires_at
      properties:
        id:
          type: string
        user_agent:
          type: string
          nullable: true
        ip:
          type: string
          nullable: true
        device_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
    AuthSessionsResponse:
      type: object
      required:
        - sessions
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/AuthSession'
    AuthForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
    AuthResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
        password_confirm:
          type: string
    AuthVerifyEmailRequest:
      type: object
      properties:
        token:
          type: string
    Account:
      type: object
      required:
        - id
        - name
        - type
        - currency
        - balance
        - initialBalance
        - includeInNetWorth
        - includeInDailyBudget
        - isArchived
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        currency:
          type: string
        balance:
          type: string
        initialBalance:
          type: string
        includeInNetWorth:
          type: boolean
        includeInDailyBudget:
          type: boolean
        isArchived:
          type: boolean
        archivedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Pagination:
      type: object
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
    PaginatedAccounts:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        pagination:
          $ref: '#/components/schemas/Pagination'
    ErrorDetail:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
    ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - validation_error
            - unauthorized
            - forbidden
            - not_found
            - conflict
            - business_rule_violation
            - internal_error
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
    CreateAccountRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        currency:
          type: string
        initialBalance:
          type: string
        includeInNetWorth:
          type: boolean
        includeInDailyBudget:
          type: boolean
    AccountSummaryAccount:
      type: object
      required:
        - id
        - name
        - type
        - currency
        - balance
        - includeInNetWorth
        - includeInDailyBudget
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        currency:
          type: string
        balance:
          type: string
        includeInNetWorth:
          type: boolean
        includeInDailyBudget:
          type: boolean
    AccountSummary:
      type: object
      required:
