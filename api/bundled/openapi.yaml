        netWorth:
          type: string
        cashBalance:
          type: string
        availableForDailyBudget:
          type: string
        creditLiabilities:
          type: string
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountSummaryAccount'
    PatchAccountRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        includeInNetWorth:
          type: boolean
        includeInDailyBudget:
          type: boolean
        currency:
          type: string
        initialBalance:
          type: string
